<!DOCTYPE html>
<html>

<head>

<title>Fake News Detection</title>

<style>

body{
font-family: Arial;
background: linear-gradient(120deg,#2193b0,#6dd5ed);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{

background:white;
padding:40px;
border-radius:10px;
width:600px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.2);

}

textarea{

width:100%;
height:180px;
padding:10px;
font-size:16px;

}

button{

padding:10px 20px;
font-size:18px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;

}

button:hover{

background:#2e7d32;

}

</style>

</head>

<body>

<div class="container">

<h1>Fake News Detection System</h1>

<form action="/predict" method="post">

<textarea name="news" placeholder="Paste news article here..." required></textarea>

<br><br>

<button type="submit">Check News</button>

</form>

<h2>{{ prediction_text }}</h2>

</div>

</body>

</html>
